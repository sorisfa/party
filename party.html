<body class="font-chalk text-chalk antialiased">

<!-- 분필 낙서 (큰 화면만) -->
<svg class="fixed top-6 left-4 w-24 h-24 opacity-60 z-0 hidden sm:block" viewBox="0 0 100 100">
  <text x="6" y="30" fill="#f6f4e9" font-size="22" opacity=".6">1+2=3</text>

<svg class="fixed top-40 right-5 w-20 h-40 opacity-50 z-0 hidden sm:block" viewBox="0 0 60 160">

  <path class="chalk-line" stroke-width="2"   d="M24 40 H36 M22 80 H38 M21 120 H39"/>
</svg>

<main class="relative z-10 max-w-md mx-auto px-5 pb-20">

  <!-- ===== HERO ===== -->
  <section class="pt-12 text-center animate-chalkin">

    <div class="inline-block bg-tomato text-chalk font-round text-2xl px-7 pt-2 pb-4 rounded-b-[40%] shadow-lg -rotate-2 chalk-text">
      철산중 · 1학년 2반
    </div>

    <h1 class="mt-6 font-impact text-7xl leading-none chalk-text">
      <span class="inline-block -rotate-2">과자</span>
      <span class="inline-block rotate-1 text-sun">파티</span>
    </h1>
    <p class="mt-3 font-round text-lg tracking-[.35em] text-chalk/60">SNACK &amp; MOVIE</p>

    <div class="mt-5 text-5xl animate-floaty">🍿</div>

    <p class="mt-4 font-chalk text-2xl text-chalk/90 leading-snug">
      함께 보는 영화 한 편,<br>함께 나누는 과자 한 봉지 🍪
    </p>

    <!-- D-day 카운트다운 -->
    <div class="mt-7">
      <p class="font-label text-sm tracking-[.3em] text-chalk/60 mb-3">파티까지 남은 시간</p>
      <div id="countdown" class="flex justify-center gap-2 sm:gap-3">
        <div class="bg-white/10 border border-white/15 rounded-2xl w-16 py-3">
          <div id="cd-d" class="font-impact text-3xl text-sun leading-none">--</div>
          <div class="font-label text-[11px] tracking-widest text-chalk/55 mt-1">일</div>
        </div>
        <div class="bg-white/10 border border-white/15 rounded-2xl w-16 py-3">
          <div id="cd-h" class="font-impact text-3xl text-chalk leading-none">--</div>
          <div class="font-label text-[11px] tracking-widest text-chalk/55 mt-1">시간</div>
        </div>
        <div class="bg-white/10 border border-white/15 rounded-2xl w-16 py-3">
          <div id="cd-m" class="font-impact text-3xl text-chalk leading-none">--</div>
          <div class="font-label text-[11px] tracking-widest text-chalk/55 mt-1">분</div>
        </div>
        <div class="bg-white/10 border border-white/15 rounded-2xl w-16 py-3">
          <div id="cd-s" class="font-impact text-3xl text-chalk leading-none">--</div>
          <div class="font-label text-[11px] tracking-widest text-chalk/55 mt-1">초</div>
        </div>
      </div>
    </div>
  </section>

    <!-- ===== 투표 ===== -->
  <section class="mt-14">
    <div class="inline-block font-label text-xl tracking-[.3em] text-chalk/70 border-b-4 border-sun pb-1 mb-4">VOTE</div>
    <h2 class="font-impact text-2xl text-chalk chalk-text">어떤 과자가 제일 좋아? 🍿</h2>

    <div id="poll" class="space-y-3"></div>
    <p id="poll-total" class="text-center font-chalk text-base text-chalk/55 mt-4">
      아직 표가 없어요. 첫 표의 주인공이 되어보세요!
    </p>
  </section>

  <!-- ===== INFO ===== -->
  <section class="mt-14">
    <div class="inline-block font-label text-xl tracking-[.3em] text-chalk/70 border-b-4 border-sun pb-1 mb-4">INFO</div>
    <div class="grid grid-cols-3 gap-3 text-center">
      <div class="bg-white/5 border border-white/15 rounded-2xl py-5">
        <div class="text-3xl">📍</div>
        <div class="font-label text-xs tracking-widest text-sun mt-2">장소</div>
        <div class="font-round text-lg mt-1 leading-tight">1-2반<br>교실</div>
      </div>
      <div class="bg-sun/95 text-board2 rounded-2xl py-5 shadow-lg shadow-sun/30 animate-wiggle">
        <div class="text-3xl">📅</div>
        <div class="font-label text-xs tracking-widest text-tomato mt-2">날짜 · 시간</div>
        <div class="font-impact text-2xl mt-1 leading-tight">6/17<br>6교시</div>
      </div>
      <div class="bg-white/5 border border-white/15 rounded-2xl py-5">
        <div class="text-3xl">🎈</div>
        <div class="font-label text-xs tracking-widest text-sun mt-2">대상</div>
        <div class="font-round text-lg mt-1 leading-tight">1-2반<br>학생 모두</div>
      </div>
    </div>
  </section>

</main>

<script>
  /* ---------- D-day 카운트다운 (14:35 기준) ---------- */
  const PARTY = new Date(2026, 5, 17, 14, 35, 0);
  function pad(n){ return String(n).padStart(2,'0'); }
  function tick(){
    const diff = PARTY - new Date();
    if(diff <= 0){
      const el = document.getElementById('countdown');
      if(el) el.innerHTML = '<div class="font-impact text-3xl text-sun py-4">🎉 오늘이 파티 날! 🎉</div>';
      return;
    }
    document.getElementById('cd-d').textContent = Math.floor(diff/86400000);
    document.getElementById('cd-h').textContent = pad(Math.floor(diff%86400000/3600000));
    document.getElementById('cd-m').textContent = pad(Math.floor(diff%3600000/60000));
    document.getElementById('cd-s').textContent = pad(Math.floor(diff%60000/1000));
  }
  tick(); setInterval(tick, 1000);

  /* ---------- 과자 투표 ---------- */
  const SNACKS = [
    { id:'swingchip', name:'스윙칩',  emoji:'🌀' },
    { id:'saeukkang', name:'새우깡',  emoji:'🦐' },
    { id:'sunchip',   name:'썬칩',    emoji:'🌽' },
    { id:'cheetos',   name:'치토스',  emoji:'🧡' },
    { id:'homerun',   name:'홈런볼',  emoji:'⚾' },
    { id:'oreo',      name:'오레오',  emoji:'🍪' },
  ];
  const KEY = 'snackparty_votes_1_2_v2';
  function loadVotes(){
    try{ const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
    return Object.fromEntries(SNACKS.map(s=>[s.id,0]));
  }
  function saveVotes(v){ try{ localStorage.setItem(KEY, JSON.stringify(v)); }catch(e){} }
  let votes = loadVotes();

  function renderPoll(){
    const total = Object.values(votes).reduce((a,b)=>a+b,0);
    const max   = Math.max(1, ...Object.values(votes));
    const wrap  = document.getElementById('poll');
    wrap.innerHTML = '';
    [...SNACKS].sort((a,b)=>votes[b.id]-votes[a.id]).forEach(sn=>{
      const v    = votes[sn.id];
      const pct  = total ? Math.round(v/total*100) : 0;
      const lead = v>0 && v===max;
      const btn  = document.createElement('button');
      btn.className = 'w-full text-left bg-white/5 hover:bg-white/10 border '
        +(lead?'border-sun/70':'border-white/10')
        +' rounded-2xl p-3 transition active:scale-[.98] relative overflow-hidden';
      btn.innerHTML =
        '<div class="absolute inset-y-0 left-0 bg-sun/20 transition-all duration-500" style="width:'+pct+'%"></div>'+
        '<div class="relative flex items-center gap-3">'+
          '<span class="text-2xl">'+sn.emoji+'</span>'+
          '<span class="font-round text-lg text-chalk flex-1">'+sn.name+(lead?' <span class="text-sun">👑</span>':'')+'</span>'+
          '<span class="font-impact text-xl text-sun">'+pct+'%</span>'+
          '<span class="font-chalk text-sm text-chalk/50 w-10 text-right">'+v+'표</span>'+
        '</div>';
      btn.onclick = ()=>{ votes[sn.id]++; saveVotes(votes); renderPoll(); updateTotal(); };
      wrap.appendChild(btn);
    });
  }
  function updateTotal(){
    const total = Object.values(votes).reduce((a,b)=>a+b,0);
    document.getElementById('poll-total').textContent =
      total ? '지금까지 '+total+'표가 모였어요! 🗳️' : '아직 표가 없어요. 첫 표의 주인공이 되어보세요!';
  }
  renderPoll(); updateTotal();
</script>

</body>
</html>
